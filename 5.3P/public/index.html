<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Books Catalog</h1>
    <p>Click the button below to load books from MongoDB Atlas.</p>
    <button id="load-books-btn" type="button">Get All Books</button>
    <p id="status-message">Click the button to load books from the database.</p>

    <div id="book-container">
        <p>No books loaded yet.</p>
    </div>

    <h2>Book Details</h2>
    <div id="book-details">
        <p>Select a book after loading the catalog.</p>
    </div>

    <script>
        const loadBooksBtn = document.getElementById("load-books-btn");
        const statusMessage = document.getElementById("status-message");
        const bookContainer = document.getElementById("book-container");
        const bookDetails = document.getElementById("book-details");

        const formatPrice = (price) => {
            const amount = Number(price);
            return Number.isNaN(amount) ? "N/A" : amount.toFixed(2);
        };

        const renderBookDetails = (book) => {
            bookDetails.innerHTML = `
                <div class="detail-block">
                    <h3>${book.title}</h3>
                    <p><strong>Author:</strong> ${book.author}</p>
                    <p><strong>Year:</strong> ${book.year}</p>
                    <p><strong>Genre:</strong> ${book.genre}</p>
                    <p><strong>Price:</strong> AUD ${formatPrice(book.price)}</p>
                    <p><strong>Summary:</strong> ${book.summary}</p>
                </div>
            `;
        };

        const loadBookDetails = async (bookId) => {
            bookDetails.innerHTML = '<p>Loading book details...</p>';

            try {
                const response = await fetch(`/api/books/${bookId}`);
                if (!response.ok) {
                    throw new Error("Request failed");
                }

                const book = await response.json();
                renderBookDetails(book);
            } catch (error) {
                console.error("Error fetching book details:", error);
                bookDetails.innerHTML = '<p>Unable to load book details.</p>';
            }
        };

        const loadBooks = async () => {
            statusMessage.textContent = "Loading books from MongoDB...";
            bookContainer.innerHTML = '<p>Loading catalog...</p>';
            bookDetails.innerHTML = '<p>Select a book after loading the catalog.</p>';

            try {
                const response = await fetch("/api/books");
                if (!response.ok) {
                    throw new Error("Request failed");
                }

                const books = await response.json();
                bookContainer.innerHTML = "";

                if (books.length === 0) {
                    statusMessage.textContent = "Connected to the database, but no books were found.";
                    bookContainer.innerHTML = '<p>No books found in the database.</p>';
                    return;
                }

                books.forEach((book) => {
                    const bookButton = document.createElement("button");
                    bookButton.type = "button";
                    bookButton.className = "book-card";
                    bookButton.innerHTML = `
                        <span class="book-title">${book.title}</span>
                        <span class="author">AUD ${formatPrice(book.price)}</span>
                    `;
                    bookButton.addEventListener("click", () => loadBookDetails(book.id));
                    bookContainer.appendChild(bookButton);
                });

                statusMessage.textContent = `Loaded ${books.length} books from the database.`;
            } catch (error) {
                console.error("Error fetching books:", error);
                statusMessage.textContent = "Failed to load books from the database.";
                bookContainer.innerHTML = '<p>Unable to load books.</p>';
            }
        };

        loadBooksBtn.addEventListener("click", loadBooks);
    </script>
</body>
</html>
